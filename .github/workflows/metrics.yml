# Visit https://github.com/lowlighter/metrics#-documentation for full reference
name: Metrics

on:
  schedule:
    # Every Sunday at 00:00 UTC
    - cron: "0 0 * * 0"

  workflow_dispatch:

  push:
    branches: ["main"]
    paths:
      - "README.md"
      - ".github/workflows/metrics.yml"

concurrency:
  group: metrics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Generate GitHub metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ersankarimi
          filename: github-metrics.svg

          # Base
          template: classic
          base: header, activity, community, repositories, metadata
          base_hireable: yes
          base_indepth: yes

          # Output
          output_action: commit
          committer_message: "chore: update github metrics [Skip GitHub Action]"

          # General config
          config_octicon: yes
          config_padding: 0, 8 + 12%
          config_timezone: Asia/Makassar
          config_twemoji: yes

          # Reliability
          retries: 3
          retries_delay: 300
          retries_output_action: 5
          retries_delay_output_action: 120

          # Repositories
          repositories_forks: yes
          repositories_batch: 50

          # Introduction
          plugin_introduction: yes
          plugin_introduction_title: yes

          # Calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Topics
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons
          plugin_topics_sort: starred

          # Languages
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_other: yes
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

          # Lines of code
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_repositories_limit: 4
          plugin_lines_sections: base

          # Disabled to avoid broken/error-prone sections
          plugin_habits: no
          plugin_code: no
          plugin_traffic: no
          plugin_projects: no
